# ─── Nest Config ────────────────────────────────────────────
# Run `nest init` to generate this interactively.

instance:
    name: "default"
    dataDir: "."
    pluginsDir: "./plugins"
    agentDir: "./.pi/agent"    # pi config (models, sessions) — isolated from ~/.pi/agent/

# ─── Sessions ───────────────────────────────────────────────

sessions:
    default:
        pi:
            cwd: /home/user
            # extensions:
            #     - /path/to/extension.ts

defaultSession: default

# ─── Server ─────────────────────────────────────────────────

# server:
#     port: 8484
#     token: "nest_your-generated-token"
#     host: "127.0.0.1"

# ─── Cron ───────────────────────────────────────────────────

# cron:
#     dir: ./cron.d
#     gracePeriodMs: 5000
#     notify: discord          # comma-separated platform names for cron output

# ─── Attach ─────────────────────────────────────────────────

# attach:
#     host: 127.0.0.1          # WebSocket host for `nest attach` (e.g. container IP)

# ─── Usage Tracking ─────────────────────────────────────────

tracking:
    usageLog: ./usage.jsonl
    capacity: 1000
    retentionDays: 30

# ─── Plugin Config ──────────────────────────────────────────
# Plugins read their own sections. The kernel doesn't validate these.

# discord:
#     token: "env:DISCORD_TOKEN"
#     notify: "1234567890"     # channel ID for cron/system notifications
#     allowed_users:            # only these Discord users can interact (omit to allow all)
#         - "username1"
#         - "username2"
#     channels:
#         "1234567890": "default"

# matrix:
#     homeserver: https://matrix.example.org
#     user: "@bot:example.org"
#     token: "env:MATRIX_TOKEN"
#     channels:
#         "!room:example.org": "default"
