# ─── Nest Config ────────────────────────────────────────────
# Run `nest init` to generate this interactively.

instance:
    name: "default"
    dataDir: "."
    pluginsDir: "./plugins"
    agentDir: "./.pi/agent"    # pi config (models, sessions) — isolated from ~/.pi/agent/
    # sandbox:
    #     enabled: true          # run in Docker container
    #     image: "nest:latest"   # docker image
    #     network: "host"        # host, none, bridge, or network name
    #     mounts:                # extra bind mounts
    #         - "/data:/data:ro"
    #     readOnly: false        # read-only root filesystem
    #     user: "1000:1000"      # uid:gid
    #     memory: "4g"           # memory limit
    #     cpus: "2.0"            # cpu limit
    #     capDrop: ["ALL"]       # drop capabilities
    #     capAdd: ["NET_BIND_SERVICE"]
    #     noNewPrivileges: true  # default: true

# ─── Sessions ───────────────────────────────────────────────

sessions:
    default:
        pi:
            cwd: /home/user
            # extensions:
            #     - /path/to/extension.ts

defaultSession: default

# ─── Server ─────────────────────────────────────────────────

# server:
#     port: 8484
#     token: "nest_your-generated-token"
#     host: "127.0.0.1"

# ─── Cron ───────────────────────────────────────────────────

# cron:
#     dir: ./cron.d
#     gracePeriodMs: 5000

# ─── Usage Tracking ─────────────────────────────────────────

tracking:
    usageLog: ./usage.jsonl
    capacity: 1000
    retentionDays: 30

# ─── Plugin Config ──────────────────────────────────────────
# Plugins read their own sections. The kernel doesn't validate these.

# discord:
#     token: "env:DISCORD_TOKEN"
#     channels:
#         "1234567890": "default"

# matrix:
#     homeserver: https://matrix.example.org
#     user: "@bot:example.org"
#     token: "env:MATRIX_TOKEN"
#     channels:
#         "!room:example.org": "default"
